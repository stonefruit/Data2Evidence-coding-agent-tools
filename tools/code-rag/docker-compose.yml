services:
  code-rag:
    build: .
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      D2E_REPO_PATH: /workspace/Data2Evidence
      EMBEDDING_BASE_URL: http://host.docker.internal:8080/v1
    volumes:
      - ../../../Data2Evidence:/workspace/Data2Evidence:ro
      - ./snapshots:/app/snapshots
      - ./qdrant-snapshots:/app/qdrant-snapshots
    ports:
      - "8088:8088"
    command: ["code-rag", "config"]

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant-storage:/qdrant/storage
      - ./qdrant-snapshots:/qdrant/snapshots
